---
- name: Side Effect - Verify k3s before upgrade
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: "Run k3s tests before upgrade"
      ansible.builtin.include_role:
        name: ednz_cloud.k3s.k3s_tests
      vars:
        k3s_tests_include_tests:
          - installation
          - cluster-health
          - core-resources

    - name: "Test: k3s version before upgrade"
      block:
        - name: "Get k3s version"
          ansible.builtin.command:
            cmd: /usr/local/bin/k3s --version
          register: k3s_version_output
          changed_when: false

        - name: "Verify k3s version"
          ansible.builtin.assert:
            that:
              - "'v1.33.6+k3s1' in k3s_version_output.stdout"
            fail_msg: "Expected k3s version v1.33.6+k3s1 before upgrade, but got: {{ k3s_version_output.stdout }}"
            success_msg: "k3s version v1.33.6+k3s1 is correctly installed before upgrade"

- name: Side Effect - Upgrade k3s (check mode)
  hosts: all
  become: true
  check_mode: true
  tasks:
    - name: "Include ednz_cloud.k3s.k3s with upgraded version (check mode)"
      ansible.builtin.include_role:
        name: "ednz_cloud.k3s.k3s"
      vars:
        k3s_version: v1.35.1+k3s1

- name: Side Effect - Upgrade k3s
  hosts: all
  become: true
  tasks:
    - name: "Include ednz_cloud.k3s.k3s with upgraded version"
      ansible.builtin.include_role:
        name: "ednz_cloud.k3s.k3s"
      vars:
        k3s_version: v1.35.1+k3s1
